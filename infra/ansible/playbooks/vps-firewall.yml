- name: Configure UFW firewall
  hosts: vps
  tasks:
    - name: Install ufw
      apt:
        name: ufw
        state: present

    - name: Set default deny incoming
      community.general.ufw:
        direction: incoming
        default: deny

    - name: Set default allow outgoing
      community.general.ufw:
        direction: outgoing
        default: allow

    - name: Allow required ports
      community.general.ufw:
        rule: allow
        port: "{{ item.split('/')[0] }}"
        proto: "{{ item.split('/')[1] }}"
      loop: "{{ ufw_allowed_ports }}"

    - name: Enable ufw
      community.general.ufw:
        state: enabled
